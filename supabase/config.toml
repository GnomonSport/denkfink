# Supabase CLI config — minimal starter.
# See https://supabase.com/docs/guides/local-development/cli/config for the full reference.
#
# This file lets `supabase link` + `supabase db push` work out of the box against
# your hosted project. `supabase start` spins up a local Postgres + Realtime + Studio
# stack for offline development.

project_id = "denkfink"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
# Allow email/password for the admin login in the config app.
enable_signup = false
enable_anonymous_sign_ins = false

[storage]
enabled = true
file_size_limit = "50MiB"
